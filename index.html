<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FULL AI LAB 💥🐾</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
body {background: linear-gradient(135deg,#ff9ad5,#a0c4ff);font-family: Arial;color:white;text-align:center;padding:20px;}
.container {max-width:1100px;margin:auto;background:rgba(0,0,0,0.4);padding:20px;border-radius:20px;}
button {padding:10px;margin:5px;border:none;border-radius:10px;background:#ff4da6;color:white;cursor:pointer;}
textarea {width:100%;height:100px;}
img {max-width:120px;border-radius:10px;margin:5px;}
.gallery {display:flex;flex-wrap:wrap;justify-content:center;}
</style>
</head>
<body>
<div class="container">
<h1>💥 FULL AI LAB — BATCH MODE 🌈🐾</h1>

<select id="species"><option>cat</option><option>wolf</option><option>fox</option></select>
<select id="outfit"><option>oversized pink hoodie</option><option>maid outfit</option><option>striped thigh highs</option><option>alt grunge outfit</option></select>
<select id="mood"><option>:3 silly</option><option>shy blushing</option><option>>:3 chaotic</option><option>sleepy cozy</option></select>

<br>
<label>Chaos 💥</label><input type="range" min="1" max="10" value="5" id="chaos">
<label>Fluff 🐾</label><input type="range" min="1" max="10" value="5" id="fluff">

<br>
<button onclick="generateBatch()">Generate 83 Images 💀</button>
<button onclick="downloadZip()">Download ZIP 📦</button>
<button onclick="clearGallery()">Clear 🗑</button>

<textarea id="prompt"></textarea>
<div class="gallery" id="gallery"></div>
</div>

<script>
let images = [];

function buildPrompt() {
  const species = document.getElementById('species').value;
  const outfit = document.getElementById('outfit').value;
  const mood = document.getElementById('mood').value;
  const chaos = document.getElementById('chaos').value;
  const fluff = document.getElementById('fluff').value;
  return `anthropomorphic ${species}, ${outfit}, ${mood}, chaos ${chaos}, fluff ${fluff}, kemono style, anime, masterpiece`;
}

async function generateBatch() {
  const gallery = document.getElementById('gallery');
  const prompt = buildPrompt();
  document.getElementById('prompt').value = prompt;

  images = [];
  gallery.innerHTML = '';

  for (let i = 0; i < 83; i++) {
    const url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt + ' variation ' + i);
    images.push(url);

    const img = document.createElement('img');
    img.src = url;
    gallery.appendChild(img);
  }
}

async function downloadZip() {
  const zip = new JSZip();

  for (let i = 0; i < images.length; i++) {
    const response = await fetch(images[i]);
    const blob = await response.blob();
    zip.file(`image_${i}.png`, blob);
  }

  const content = await zip.generateAsync({ type: "blob" });
  saveAs(content, "ai_images.zip");
}

function clearGallery() {
  document.getElementById('gallery').innerHTML = '';
  images = [];
}
</script>
</body>
</html>
